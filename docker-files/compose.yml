# iVDrive production template – use pre-built images (no build).
# Set IVDRIVE_VERSION in .env or override when running (e.g. v1.0.6).

version: "3.9"

networks:
  ivdrive-backend:
    driver: bridge

services:
  ivdrive-api:
    image: m7xlab/ivdrive-api:${IVDRIVE_VERSION:-v1.0.7}
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      STATISTICS_QUERY_DEBUG: "${STATISTICS_QUERY_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
    networks:
      - ivdrive-backend
    volumes:
      - ./shared_data:/app/shared_data
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  ivdrive-web:
    image: m7xlab/ivdrive-web:${IVDRIVE_VERSION:-v1.0.7}
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
    networks:
      - ivdrive-backend
    ports:
      - "3035:3000"
    depends_on:
      - ivdrive-api
    restart: unless-stopped

  ivdrive-collector:
    image: m7xlab/ivdrive-collector:${IVDRIVE_VERSION:-v1.0.7}
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      COLLECTOR_DEBUG: "${COLLECTOR_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
    networks:
      - ivdrive-backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    networks:
      - ivdrive-backend
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - ${DATA_PATH:-./data}/postgresql:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "7432:5432"
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.0.2-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    networks:
      - ivdrive-backend
    volumes:
      - ${DATA_PATH:-./data}/valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
