# iVDrive production template – use pre-built images (no build).
# Set IVDRIVE_VERSION in .env or override when running (e.g. v1.0.8).
#
# Requires a .env alongside this file providing at least:
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB / VALKEY_PASSWORD
#   JWT_SECRET_KEY / ENCRYPTION_KEY / CORS_ORIGINS
#   SKODA_BASE_URL / SKODA_AUTH_CLIENT_ID / SKODA_AUTH_REDIRECT_URI
#   MINIMAX_API_KEY / GEMINI_API_KEY            (AI chat + RAG embeddings)
#   S3_ENDPOINT / S3_BUCKET / S3_ACCESS_KEY / S3_SECRET_KEY / CONVERSATION_SESSIONS_BUCKET

networks:
  ivdrive-backend:
    driver: bridge

services:
  ivdrive-api:
    image: m7xlab/ivdrive-api:${IVDRIVE_VERSION:-v1.0.8}
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      STATISTICS_QUERY_DEBUG: "${STATISTICS_QUERY_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
      # Skoda Connect integration
      SKODA_BASE_URL: "${SKODA_BASE_URL}"
      SKODA_AUTH_CLIENT_ID: "${SKODA_AUTH_CLIENT_ID}"
      SKODA_AUTH_REDIRECT_URI: "${SKODA_AUTH_REDIRECT_URI}"
      # Object storage (conversation session backups)
      USE_GCS_STORAGE: "${USE_GCS_STORAGE:-false}"
      GCS_BUCKET: "${GCS_BUCKET:-}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS:-}"
      USE_S3_STORAGE: "${USE_S3_STORAGE:-true}"
      CONVERSATION_SESSIONS_BUCKET: "${CONVERSATION_SESSIONS_BUCKET:-ivdrive-conversation-sessions}"
      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      # AI assistant (chat LLM) + RAG embeddings
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
    networks:
      - ivdrive-backend
    volumes:
      - ./shared_data:/app/shared_data
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  ivdrive-web:
    image: m7xlab/ivdrive-web:${IVDRIVE_VERSION:-v1.0.8}
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      SITE_ANALYTICS_URL: "${SITE_ANALYTICS_URL:-}"
      SITE_ANALYTICS_KEY: "${SITE_ANALYTICS_KEY:-}"
    networks:
      - ivdrive-backend
    ports:
      - "3035:3000"
    depends_on:
      - ivdrive-api
    restart: unless-stopped

  ivdrive-collector:
    image: m7xlab/ivdrive-collector:${IVDRIVE_VERSION:-v1.0.8}
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      COLLECTOR_DEBUG: "${COLLECTOR_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
      # RAG embedding worker — drains ai_embeddings_queue (admin backfill button).
      # GEMINI_API_KEY (from env_file above) is required to generate embeddings.
      EMBEDDING_WORKER_ENABLED: "${EMBEDDING_WORKER_ENABLED:-true}"
      EMBEDDING_WORKER_POLL_INTERVAL_SECONDS: "${EMBEDDING_WORKER_POLL_INTERVAL_SECONDS:-300}"
      EMBEDDING_WORKER_BATCH_SIZE: "${EMBEDDING_WORKER_BATCH_SIZE:-50}"
      EMBEDDING_WORKER_MAX_ATTEMPTS: "${EMBEDDING_WORKER_MAX_ATTEMPTS:-3}"
    networks:
      - ivdrive-backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # pgvector image is REQUIRED — the AI migrations run `CREATE EXTENSION vector`.
    # Plain postgres:18 has no pgvector and the migration will fail.
    image: pgvector/pgvector:pg18
    networks:
      - ivdrive-backend
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - ${DATA_PATH:-./data}/postgresql:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "7432:5432"
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.0.2-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    networks:
      - ivdrive-backend
    volumes:
      - ${DATA_PATH:-./data}/valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
