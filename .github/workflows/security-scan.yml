# .github/workflows/security-scan.yml
# Comprehensive security scanning: container images, SAST, secrets, IaC
# Runs in parallel on PRs and pushes to main; uploads SARIF to GitHub Security tab

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan on Sundays at 03:00 UTC (catches new CVEs in unchanged code)
    - cron: '0 3 * * 0'

# Cancel superseded runs on the same PR/branch
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # required to upload SARIF
  actions: read            # required by CodeQL

jobs:
  # ─────────────────────────────────────────────
  # 1. Container image scan (Trivy)
  # ─────────────────────────────────────────────
  trivy-image:
    name: Trivy — Docker image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally, do not push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: api
          load: true
          tags: app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download Trivy vulnerability database
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: '0.36.0'
          update-cache: true
          cache-dir: .trivy-cache

      - name: Run Trivy on the image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'app:scan'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'              # report only, don't fail build
          vuln-type: 'os,library'
          cache-dir: .trivy-cache

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image.sarif'
          category: trivy-image

  # ─────────────────────────────────────────────
  # 2. Filesystem + IaC scan (Trivy fs)
  #    Catches vulnerable deps, Dockerfile issues, K8s/Terraform misconfig
  # ─────────────────────────────────────────────
  trivy-fs:
    name: Trivy — Filesystem & IaC
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Scan deps, IaC, and secrets in one pass
          scanners: 'vuln,misconfig,secret'
          exit-code: '0'

      - name: Upload Trivy fs SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs.sarif'
          category: trivy-fs

  # ─────────────────────────────────────────────
  # 3. SAST — Semgrep (fast, runs on every PR)
  # ─────────────────────────────────────────────
  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/default \
            --config=p/security-audit \
            --config=p/secrets \
            --disable-version-check \
            --sarif --output=semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─────────────────────────────────────────────
  # 4. SAST — CodeQL (deep semantic analysis)
  #    Runs on push/schedule only — slower, not ideal for every PR
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL — Deep SAST
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Adjust to your stack. Common: python, javascript-typescript, go, java-kotlin, csharp
        language: ['python', 'javascript-typescript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────
  # 5. Secrets scan (Gitleaks) — belt-and-suspenders alongside Trivy/Semgrep
  # ─────────────────────────────────────────────
  gitleaks:
    name: Gitleaks — Secrets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: GITLEAKS_LICENSE for org accounts