networks:
  backend:
    driver: bridge

services:
  ivdrive-api:
    image: ivdrive-ivdrive-api:latest
    build:
      context: ./backend
      target: api
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      STATISTICS_QUERY_DEBUG: "${STATISTICS_QUERY_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
      USE_GCS_STORAGE: "${USE_GCS_STORAGE:-false}"
      GCS_BUCKET: "${GCS_BUCKET}"
      GOOGLE_APPLICATION_CREDENTIALS: "${GOOGLE_APPLICATION_CREDENTIALS}"      
      USE_S3_STORAGE: "${USE_S3_STORAGE:-false}"
      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
    networks:
      - backend
    volumes:
      - ./shared_data:/app/shared_data
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  ivdrive-web:
    image: ivdrive-ivdrive-web:latest
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
      SITE_ANALYTICS_URL: "${SITE_ANALYTICS_URL:-}"
      SITE_ANALYTICS_KEY: "${SITE_ANALYTICS_KEY:-}"
    networks:
      - backend
    ports:
      - "3000:3000"
    depends_on:
      - ivdrive-api
    restart: unless-stopped

  ivdrive-collector:
    image: ivdrive-ivdrive-collector:latest
    build:
      context: ./backend
      target: collector
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      VALKEY_URL: "valkey://:${VALKEY_PASSWORD}@valkey:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      COLLECTOR_DEBUG: "${COLLECTOR_DEBUG:-false}"
      SERVICE_REGISTRATION: "${SERVICE_REGISTRATION:-open}"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    networks:
      - backend
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - ./data/postgresql:/var/lib/postgresql/
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.0.2-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    networks:
      - backend
    volumes:
      - ./data/valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
